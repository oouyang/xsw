name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: docker.io
  IMAGE_NAME: oouyang/xsw

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        run: |
          # Default to 'latest' tag
          TAGS="${{ env.IMAGE_NAME }}:latest"

          # If pushing a version tag (e.g., v1.0.0), add version tags
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAGS="${{ env.IMAGE_NAME }}:${VERSION},${{ env.IMAGE_NAME }}:latest"
          fi

          # If on main/master branch, use 'edge' tag
          if [[ $GITHUB_REF == refs/heads/main ]] || [[ $GITHUB_REF == refs/heads/master ]]; then
            TAGS="${{ env.IMAGE_NAME }}:edge,${{ env.IMAGE_NAME }}:latest"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "version=${VERSION:-edge}" >> $GITHUB_OUTPUT

      - name: Build and push backend (xsw) image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: xsw
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false') && secrets.DOCKERHUB_TOKEN != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BASE_URL=https://czbooks.net
            AUTH_ENABLED=true
          cache-from: type=gha,scope=xsw
          cache-to: type=gha,mode=max,scope=xsw

      - name: Build and push frontend (web) image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: web
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false') && secrets.DOCKERHUB_TOKEN != '' }}
          tags: ${{ steps.meta.outputs.tags }}-web
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "### Docker Images Built ✅" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️  **Images were built but NOT pushed** (Docker Hub credentials not configured)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable pushing to Docker Hub:" >> $GITHUB_STEP_SUMMARY
            echo "1. Create access token at https://hub.docker.com/settings/security" >> $GITHUB_STEP_SUMMARY
            echo "2. Add secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN to repository" >> $GITHUB_STEP_SUMMARY
            echo "3. See docs/GITHUB_ACTIONS.md for details" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Docker Images Built and Pushed 🚀" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Backend (xsw):**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Frontend (web):**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.meta.outputs.tags }}-web" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
