<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octile Analytics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; min-height: 100vh; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; color: #f1f5f9; }
  .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 24px; }
  .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: #1e293b; border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; }
  .stat-val { font-size: 1.8rem; font-weight: 700; color: #38bdf8; }
  .stat-label { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
  .chart-card { background: #1e293b; border-radius: 12px; padding: 20px; }
  .chart-card h2 { font-size: 1rem; margin-bottom: 14px; color: #cbd5e1; }
  .bar-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
  .bar-label { width: 100px; font-size: 0.82rem; color: #94a3b8; text-align: right; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 22px; background: #334155; border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; min-width: 2px; }
  .bar-count { font-size: 0.78rem; color: #94a3b8; width: 50px; text-align: right; flex-shrink: 0; }
  .bar-pct { position: absolute; right: 6px; top: 2px; font-size: 0.72rem; color: rgba(255,255,255,0.7); }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { text-align: left; padding: 8px 10px; color: #64748b; border-bottom: 1px solid #334155; font-weight: 600; }
  td { padding: 7px 10px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
  tr:hover td { background: #1e293b; }
  .table-card { background: #1e293b; border-radius: 12px; padding: 20px; overflow-x: auto; }
  .table-card h2 { font-size: 1rem; margin-bottom: 14px; color: #cbd5e1; }
  .ua { font-size: 0.72rem; color: #475569; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .loading { text-align: center; padding: 60px; color: #64748b; }
  .error { text-align: center; padding: 60px; color: #f87171; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
  .pill-android { background: #166534; color: #4ade80; }
  .pill-ios { background: #1e3a5f; color: #60a5fa; }
  .pill-desktop { background: #44403c; color: #d6d3d1; }
  .pill-unknown { background: #334155; color: #94a3b8; }
  .refresh-btn { background: #334155; border: none; color: #94a3b8; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .refresh-btn:hover { background: #475569; color: #e2e8f0; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Octile Analytics</h1>
    <div class="subtitle" id="updated"></div>
  </div>
  <button class="refresh-btn" onclick="load()">Refresh</button>
</div>

<div id="content"><div class="loading">Loading...</div></div>

<script>
const COLORS = ['#38bdf8','#a78bfa','#fb923c','#4ade80','#f472b6','#facc15','#34d399','#f87171','#818cf8','#94a3b8'];

function pillClass(p) {
  if (p === 'Android') return 'pill-android';
  if (p === 'iOS') return 'pill-ios';
  if (p === 'Desktop') return 'pill-desktop';
  return 'pill-unknown';
}

function barChart(items, total) {
  if (!items.length) return '<div style="color:#64748b">No data</div>';
  const max = items[0][1];
  return items.map(([name, count], i) => {
    const pct = total > 0 ? (count / total * 100).toFixed(1) : 0;
    const w = max > 0 ? (count / max * 100) : 0;
    return `<div class="bar-row">
      <div class="bar-label" title="${name}">${name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${COLORS[i % COLORS.length]}"></div><span class="bar-pct">${pct}%</span></div>
      <div class="bar-count">${count}</div>
    </div>`;
  }).join('');
}

function render(d) {
  const total = d.players_with_ua;
  let html = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${d.total_players.toLocaleString()}</div><div class="stat-label">Total Players</div></div>
      <div class="stat-card"><div class="stat-val">${d.total_scores.toLocaleString()}</div><div class="stat-label">Total Scores</div></div>
      <div class="stat-card"><div class="stat-val">${d.players_with_ua}</div><div class="stat-label">Players with UA</div></div>
    </div>
    <div class="charts">
      <div class="chart-card"><h2>Platform</h2>${barChart(d.platform, total)}</div>
      <div class="chart-card"><h2>Operating System</h2>${barChart(d.os, total)}</div>
      <div class="chart-card"><h2>Browser</h2>${barChart(d.browser, total)}</div>
    </div>
    <div class="table-card">
      <h2>Players (${d.players.length})</h2>
      <table>
        <tr><th>UUID</th><th>Platform</th><th>OS</th><th>Browser</th><th>Last Seen</th><th>User Agent</th></tr>
        ${d.players.map(p => `<tr>
          <td><code>${p.uuid}</code></td>
          <td><span class="pill ${pillClass(p.platform)}">${p.platform}</span></td>
          <td>${p.os}</td>
          <td>${p.browser}</td>
          <td>${p.last_seen ? new Date(p.last_seen).toLocaleDateString() : ''}</td>
          <td class="ua" title="${p.ua}">${p.ua}</td>
        </tr>`).join('')}
      </table>
    </div>`;
  document.getElementById('content').innerHTML = html;
  document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

async function load() {
  try {
    document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';
    const base = window.location.pathname.replace('/analytics/dashboard', '');
    const resp = await fetch(base + '/analytics');
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="error">Failed to load: ' + e.message + '</div>';
  }
}

load();
</script>
</body>
</html>
